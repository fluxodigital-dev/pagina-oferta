<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscando sua promoção</title>

<style>

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#4facfe,#00f2fe);
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
text-align:center;
width:90%;
max-width:360px;
}

.progress{
width:100%;
height:8px;
background:#eee;
border-radius:10px;
overflow:hidden;
margin:20px 0;
}

.bar{
height:100%;
width:0%;
background:#4caf50;
animation:load 1s forwards;
}

@keyframes load{
0%{width:0%}
100%{width:100%}
}

.timer{
font-size:20px;
font-weight:bold;
color:#e53935;
margin:10px 0;
}

.button{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
width:100%;
border:none;
padding:12px;
margin-top:10px;
border-radius:8px;
font-size:15px;
cursor:pointer;
color:white;
}

.whatsapp{
background:#25D366;
}

.linktree{
background:#111;
}

.instagram{
background:#E1306C;
}

.button img{
width:20px;
height:20px;
}

.footer{
font-size:11px;
color:#777;
margin-top:10px;
}

</style>
</head>

<body>

<div class="card">

<div id="loading">

<h3>🔎 Buscando sua promoção...</h3>

<div class="progress">
<div class="bar"></div>
</div>

<p>Aguarde um instante...</p>

</div>

<div id="resultado" style="display:none">

<h2>🎉 Promoção encontrada!</h2>

<p>
Seu atendimento foi enviado para nossa equipe.
</p>

<p>
⏳ Um consultor vai falar com você no Direct em instantes.
</p>

<p>Oferta reservada por:</p>

<div class="timer" id="countdown">05:00</div>

<button class="button whatsapp"
onclick="window.open('https://wa.me/5599984442913')">

<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">

Falar no WhatsApp

</button>

<button class="button linktree"
onclick="window.open('https://linktr.ee/InstitutoChavesSousa')">

<img src="https://cdn-icons-png.flaticon.com/512/3536/3536505.png">

Ver todos os links

</button>

<button class="button instagram"
onclick="window.close()">

<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">

Voltar para Instagram

</button>

<div class="footer">
Automação inteligente
</div>

</div>

</div>

<script>

// pegar dados enviados pelo ManyChat
const params = new URLSearchParams(window.location.search)

const nome = params.get("nome")
const curso = params.get("curso")
const area = params.get("area")
const instagram = params.get("instagram")
const origem = params.get("origem")

// enviar para webhook do Make
fetch("https://hook.us2.make.com/twgle86aw99utpxx8c489bb850hzoaiq",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
nome:nome,
curso:curso,
area:area,
instagram:instagram,
origem:origem
})
})

// mostrar resultado
setTimeout(()=>{
document.getElementById("loading").style.display="none"
document.getElementById("resultado").style.display="block"
confetti()
},1000)


// contador regressivo
let tempo = 300

function atualizar(){

let minutos = Math.floor(tempo/60)
let segundos = tempo % 60

if(segundos < 10){
segundos = "0"+segundos
}

document.getElementById("countdown").innerHTML =
minutos + ":" + segundos

tempo--

}

setInterval(atualizar,1000)

</script>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</body>
</html>

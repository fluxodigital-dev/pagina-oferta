<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Buscando sua promoção...</title>

<style>

body{
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#4facfe,#00f2fe);
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
text-align:center;
width:360px;
}

h1{
color:#2e7d32;
margin-bottom:10px;
}

.progress{
width:100%;
height:10px;
background:#eee;
border-radius:10px;
overflow:hidden;
margin:20px 0;
}

.bar{
height:100%;
width:0%;
background:#4caf50;
animation:load 1s forwards;
}

@keyframes load{
0%{width:0%}
100%{width:100%}
}

.timer{
font-size:22px;
font-weight:bold;
color:#e53935;
margin:15px 0;
}

button{
display:block;
width:100%;
border:none;
padding:12px;
margin-top:10px;
border-radius:8px;
font-size:15px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
}

.whatsapp{
background:#25D366;
color:white;
}

.linktree{
background:#111;
color:white;
}

.instagram{
background:#E1306C;
color:white;
}

.footer{
font-size:11px;
color:#777;
margin-top:15px;
}

</style>

</head>

<body>

<div class="card">

<div id="loading">

<h2>🔎 Buscando sua promoção...</h2>

<div class="progress">
<div class="bar"></div>
</div>

<p>Aguarde um instante...</p>

</div>

<div id="resultado" style="display:none">

<h1>Promoção encontrada! 🎉</h1>

<p>
Seu atendimento foi enviado para nossa equipe.
</p>

<p>
⏳ Um consultor vai falar com você no Direct em instantes.
</p>

<p>Oferta reservada por:</p>

<div class="timer" id="countdown">05:00</div>

<button class="whatsapp"
onclick="window.open('https://wa.me/5599984442913')">
📲 Falar no WhatsApp
</button>

<button class="linktree"
onclick="window.open('https://linktr.ee/InstitutoChavesSousa')">
🌐 Ver todos os links
</button>

<button class="instagram"
onclick="history.back()">
📸 Voltar para Instagram
</button>

<div class="footer">
Automação inteligente
</div>

</div>

</div>

<script>

// pegar dados da URL enviados pelo ManyChat
const params = new URLSearchParams(window.location.search)

const nome = params.get("nome")
const curso = params.get("curso")
const area = params.get("area")
const instagram = params.get("instagram")
const origem = params.get("origem")

// enviar para webhook do Make
fetch("https://hook.us2.make.com/twgle86aw99utpxx8c489bb850hzoaiq",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
nome:nome,
curso:curso,
area:area,
instagram:instagram,
origem:origem
})
})

// mostrar resultado depois de 1 segundo
setTimeout(()=>{
document.getElementById("loading").style.display="none"
document.getElementById("resultado").style.display="block"
},1000)


// contador regressivo
let tempo = 300

function atualizar(){

let minutos = Math.floor(tempo/60)
let segundos = tempo % 60

if(segundos < 10){
segundos = "0"+segundos
}

document.getElementById("countdown").innerHTML =
minutos + ":" + segundos

tempo--

}

setInterval(atualizar,1000)

</script>

</body>
</html>
